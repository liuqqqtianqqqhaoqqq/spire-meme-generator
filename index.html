<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>尖塔梗生成器</title>
<style>
:root{--bg:#0d0d1a;--surface:#141428;--gold:#c8a84e;--gold-dim:#8a7030;--blue:#4a9eff;--red:#e04040;--text:#d8d8e0;--text2:#a0a0b0;--text3:#606078;--border:#2a2a40;--r:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:600px;margin:0 auto;padding:32px 16px}

.header{text-align:center;margin-bottom:28px}
.header .icon{font-size:48px;margin-bottom:8px}
.header h1{font-size:26px;font-weight:800;color:var(--gold);letter-spacing:3px}
.header .sub{font-size:13px;color:var(--text3);margin-top:4px}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:12px}

textarea{width:100%;min-height:90px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px;color:var(--text);font-size:15px;resize:vertical;font-family:inherit;outline:none;line-height:1.7;transition:border .2s}
textarea:focus{border-color:var(--blue)}
textarea::placeholder{color:var(--text3)}

.key-row{display:flex;gap:8px;align-items:center;margin-top:10px}
.key-row input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text2);font-size:13px;font-family:inherit;outline:none}
.key-row input:focus{border-color:var(--gold-dim)}
.key-row .hint{font-size:11px;color:var(--text3);white-space:nowrap}
.key-saved{font-size:11px;color:#609060}

.btn-row{display:flex;gap:8px;margin-top:12px}
.btn{padding:11px 28px;border-radius:20px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.btn:active{transform:scale(.97)}
.btn-go{background:linear-gradient(135deg,var(--blue),#3060c0);color:#fff;flex:1}
.btn-go:hover{transform:translateY(-1px)}
.btn-go:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2);padding:11px 20px}

.loader{display:none;text-align:center;padding:16px;color:var(--text3);font-size:13px}
.loader.show{display:block}
.loader .spin{width:24px;height:24px;margin:0 auto 8px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:s .7s linear infinite}
@keyframes s{to{transform:rotate(360deg)}}

.result{display:none}
.result.show{display:block}

.r-card{background:linear-gradient(170deg,#181830,#101020);border:2px solid rgba(200,168,78,.3);border-radius:14px;overflow:hidden;margin-bottom:10px;box-shadow:0 0 20px rgba(200,168,78,.08)}
.r-top{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid var(--border);gap:10px}
.r-cost{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;background:linear-gradient(135deg,#4a9eff,#2a6ed0);color:#fff}
.r-name{font-size:18px;font-weight:800;color:var(--gold)}
.r-type{font-size:11px;color:var(--text3);margin-top:1px}
.r-body{padding:14px;font-size:14px;line-height:1.8}
.r-body em{color:var(--gold);font-style:normal;font-weight:700}
.r-flavor{margin-top:8px;padding-top:8px;border-top:1px dashed #2a2a3a;font-size:12px;color:var(--text3);font-style:italic}

.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--gold-dim);border-radius:20px;padding:10px 22px;color:var(--gold);font-weight:700;font-size:13px;z-index:99;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

.footer{text-align:center;padding:24px 0;color:var(--text3);font-size:11px;border-top:1px solid var(--border);margin-top:24px}
.footer a{color:var(--gold-dim);text-decoration:none}

@media(max-width:480px){.app{padding:16px 10px}.header h1{font-size:20px}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="icon">🤖</div>
    <h1>尖 塔 梗 生 成 器</h1>
    <p class="sub">输入你的遭遇 → AI 自动翻译成鸡煲笑话</p>
  </div>

  <div class="card">
    <textarea id="textInput" placeholder="描述你的情况…&#10;比如：今天学了六个单元学不下去了" maxlength="400"></textarea>

    <div class="key-row" id="pwdRow">
      <input type="password" id="pwdInput" placeholder="输入访问密码" autocomplete="off">
      <button class="btn btn-ghost" onclick="unlockPwd()" style="flex-shrink:0;padding:8px 16px;font-size:13px">解锁</button>
    </div>
    <div class="key-row" id="keyRow" style="display:none">
      <span style="color:#609060;font-size:12px">🔓 已解锁 — API Key 受服务器保护</span>
      <button class="btn btn-ghost" onclick="clearPwd()" style="padding:4px 12px;font-size:11px;color:var(--red)">锁定</button>
    </div>
    <span class="badge" id="unlockBadge" style="display:none;float:right;font-size:10px;padding:2px 8px;border-radius:8px;background:rgba(64,200,96,0.1);color:var(--green);margin-top:4px">🔓 已解锁</span>

    <div class="btn-row">
      <button class="btn btn-go" id="btnGo" onclick="go()">🤖 生成梗</button>
    </div>
  </div>

  <div class="loader" id="loader"><div class="spin"></div>AI 正在分析…</div>
  <div class="result" id="result"></div>

  <div class="footer">
    由 <strong>地大夏目夏目夏</strong> 制作 · 基于《杀戮尖塔》社区梗文化
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PASSWORD='yit';

let pwdUnlocked=false;

// 初始化：清除旧版localStorage残留
try{const old=localStorage.getItem('sts_key');if(old&&old.includes('***'))localStorage.removeItem('sts_key')}catch(e){}
pwdUnlocked=localStorage.getItem('sts_pwd')==='1';
// 页面加载时向服务器验证密码状态
if(pwdUnlocked){
  const apiUrl=window.location.hostname==='localhost'?'http://localhost:8765/api/analyze':'/api/analyze';
  fetch(apiUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:'verify',password:PASSWORD,verify_only:true})})
    .then(r=>{if(!r.ok){pwdUnlocked=false;localStorage.removeItem('sts_pwd');updateUI()}})
    .catch(()=>{});
}

function updateUI(){
  if(pwdUnlocked){
    document.getElementById('pwdRow').style.display='none';
    document.getElementById('keyRow').style.display='none';
    document.getElementById('unlockBadge').style.display='inline';
  }else{
    document.getElementById('unlockBadge').style.display='none';
  }
}

async function unlockPwd(){
  const v=document.getElementById('pwdInput').value.trim();
  if(v!==PASSWORD){t('密码错误');return}
  // 向服务器验证密码
  showLoader(true);
  try{
    const apiUrl=window.location.hostname==='localhost'?'http://localhost:8765/api/analyze':'/api/analyze';
    const resp=await fetch(apiUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:'verify',password:v,verify_only:true})});
    if(resp.ok){
      pwdUnlocked=true;localStorage.setItem('sts_pwd','1');
      updateUI();t('✅ 已解锁！');
    }else{
      t('密码错误');
    }
  }catch(e){t('无法连接服务器');}
  showLoader(false);
}

function clearPwd(){
  pwdUnlocked=false;localStorage.removeItem('sts_pwd');
  updateUI();t('已锁定');
}

async function go(){
  const text=document.getElementById('textInput').value.trim();
  if(!text){t('请输入文字');return}
  if(!pwdUnlocked){t('请先输入密码解锁');return}

  showLoader(true);
  document.getElementById('result').classList.remove('show');
  document.getElementById('btnGo').disabled=true;

  try{
    const apiUrl=window.location.hostname==='localhost'?'http://localhost:8765/api/analyze':'/api/analyze';
    const resp=await fetch(apiUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text,password:PASSWORD})});
    if(!resp.ok){
      const err=await resp.json().catch(()=>({}));
      throw new Error(err.message||'API '+resp.status);
    }
    const data=await resp.json();
    showLoader(false);
    render(data,text);
  }catch(err){
    console.error(err);
    showLoader(false);
    t('AI调用失败: '+err.message.slice(0,30));
  }finally{
    document.getElementById('btnGo').disabled=false;
  }
}

function render(data,text){
  const p=document.getElementById('result');
  const cards=data.cards||[];
  let h='';

  // 卡牌
  if(cards.length){
    h+='<div style="font-size:12px;color:var(--gold-dim);margin-bottom:6px;text-align:center">🃏 卡牌匹配</div>';
    cards.forEach(c=>{
      h+=`<div class="r-card">
        <div class="r-top"><div class="r-cost">${c.cost||'🃏'}</div><div><div class="r-name">${c.name||'?'}</div><div class="r-type">${c.character||'鸡煲'}</div></div></div>
        <div class="r-body">${(c.why||c.effect||'').replace(/\n/g,'<br>')}</div>
        ${c.flavor?`<div class="r-flavor">${c.flavor}</div>`:''}
      </div>`;
    });
  }

  // 谐音梗
  if(data.wordplay){
    h+=`<div style="font-size:12px;color:var(--gold-dim);margin:12px 0 6px;text-align:center">🎭 谐音梗</div>`;
    h+=`<div class="r-card"><div class="r-body" style="font-size:16px;text-align:center;color:var(--gold)">${data.wordplay}</div></div>`;
  }

  // 农神语
  if(data.nongshen){
    h+=`<div style="font-size:12px;color:var(--gold-dim);margin:12px 0 6px;text-align:center">🐷 农神语</div>`;
    h+=`<div class="r-card"><div class="r-top"><div style="font-weight:700;color:var(--gold)">噶人们，我跟你们说啊</div></div><div class="r-body">${data.nongshen.replace(/\n/g,'<br>')}</div></div>`;
  }

  // 社区黑话
  if(data.slang){
    h+=`<div style="font-size:12px;color:var(--gold-dim);margin:12px 0 6px;text-align:center">💬 社区接梗</div>`;
    h+=`<div class="r-card"><div class="r-body" style="font-size:15px">${data.slang.replace(/\n/g,'<br>')}</div></div>`;
  }

  if(!h)h=`<div class="r-card"><div class="r-body">${JSON.stringify(data)}</div></div>`;

  p.innerHTML=h;
  p.classList.add('show');
  p.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function t(msg){const e=document.getElementById('toast');e.textContent=msg;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2200)}
function showLoader(s){document.getElementById('loader').classList.toggle('show',s)}

updateUI();
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();go()}});
</script>
</body>
</html>
