<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>尖塔梗生成器</title>
<style>
:root{--bg:#0d0d1a;--surface:#141428;--gold:#c8a84e;--gold-dim:#8a7030;--blue:#4a9eff;--red:#e04040;--text:#d8d8e0;--text2:#a0a0b0;--text3:#606078;--border:#2a2a40;--r:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:600px;margin:0 auto;padding:32px 16px}

.header{text-align:center;margin-bottom:28px}
.header .icon{font-size:48px;margin-bottom:8px}
.header h1{font-size:26px;font-weight:800;color:var(--gold);letter-spacing:3px}
.header .sub{font-size:13px;color:var(--text3);margin-top:4px}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:12px}

textarea{width:100%;min-height:90px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px;color:var(--text);font-size:15px;resize:vertical;font-family:inherit;outline:none;line-height:1.7;transition:border .2s}
textarea:focus{border-color:var(--blue)}
textarea::placeholder{color:var(--text3)}

.key-row{display:flex;gap:8px;align-items:center;margin-top:10px}
.key-row input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text2);font-size:13px;font-family:inherit;outline:none}
.key-row input:focus{border-color:var(--gold-dim)}
.key-row .hint{font-size:11px;color:var(--text3);white-space:nowrap}
.key-saved{font-size:11px;color:#609060}

.btn-row{display:flex;gap:8px;margin-top:12px}
.btn{padding:11px 28px;border-radius:20px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.btn:active{transform:scale(.97)}
.btn-go{background:linear-gradient(135deg,var(--blue),#3060c0);color:#fff;flex:1}
.btn-go:hover{transform:translateY(-1px)}
.btn-go:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2);padding:11px 20px}

.loader{display:none;text-align:center;padding:16px;color:var(--text3);font-size:13px}
.loader.show{display:block}
.loader .spin{width:24px;height:24px;margin:0 auto 8px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:s .7s linear infinite}
@keyframes s{to{transform:rotate(360deg)}}

.result{display:none}
.result.show{display:block}

.r-card{background:linear-gradient(170deg,#181830,#101020);border:2px solid rgba(200,168,78,.3);border-radius:14px;overflow:hidden;margin-bottom:10px;box-shadow:0 0 20px rgba(200,168,78,.08)}
.r-top{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid var(--border);gap:10px}
.r-cost{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;background:linear-gradient(135deg,#4a9eff,#2a6ed0);color:#fff}
.r-name{font-size:18px;font-weight:800;color:var(--gold)}
.r-type{font-size:11px;color:var(--text3);margin-top:1px}
.r-body{padding:14px;font-size:14px;line-height:1.8}
.r-body em{color:var(--gold);font-style:normal;font-weight:700}
.r-flavor{margin-top:8px;padding-top:8px;border-top:1px dashed #2a2a3a;font-size:12px;color:var(--text3);font-style:italic}

.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--gold-dim);border-radius:20px;padding:10px 22px;color:var(--gold);font-weight:700;font-size:13px;z-index:99;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

.footer{text-align:center;padding:24px 0;color:var(--text3);font-size:11px;border-top:1px solid var(--border);margin-top:24px}
.footer a{color:var(--gold-dim);text-decoration:none}

@media(max-width:480px){.app{padding:16px 10px}.header h1{font-size:20px}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="icon">🤖</div>
    <h1>尖 塔 梗 生 成 器</h1>
    <p class="sub">输入你的遭遇 → AI 自动翻译成鸡煲笑话</p>
  </div>

  <div class="card">
    <textarea id="textInput" placeholder="描述你的情况…&#10;比如：今天学了六个单元学不下去了" maxlength="400"></textarea>

    <div class="key-row">
      <input type="password" id="keyInput" placeholder="输入 API Key（只存浏览器）" autocomplete="off">
      <span class="hint" id="keyHint">🔒 未保存</span>
    </div>

    <div class="btn-row">
      <button class="btn btn-go" id="btnGo" onclick="go()">🤖 生成梗</button>
    </div>
  </div>

  <div class="loader" id="loader"><div class="spin"></div>AI 正在分析…</div>
  <div class="result" id="result"></div>

  <div class="footer">
    由 <strong>地大夏目夏目夏</strong> 制作 · 基于《杀戮尖塔》社区梗文化
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_URL='https://api-slb.packyapi.com/v1/chat/completions';
const MODEL='deepseek-v4-flash';

const SP=`你是尖塔梗大师。用户描述生活场景，你用杀戮尖塔卡牌梗来"翻译"。

卡牌速查：
凡庸-手牌太多打不出 → 任务多到做不动
偏差认知-+4集中每回合-1 → 以为自己会了其实全忘光
鬼抽-关键牌沉底 → 运气极差/考试考没复习的
还在启动-迟迟不开始 → 拖延症
回响形态-触发两次 → 复读机
循环-死循环 → debug地狱
内核加速-0费+能量 → 喝咖啡提神
自我修复-战后回血 → 休息恢复
耗尽-透支 → 熬夜爆肝
裂变-消耗球→ 多任务并行
重启-洗牌重抽 → 推倒重来
碎片整理-+集中 → 收拾整理
硬化-+格挡 → 被打击后变强
伤口-不可打出 → 水课/没用
虚无-不打消失 → 错过机会
混沌-随机填充 → 一团糟/系统崩
创造性AI-生成能力牌 → 灵感迸发
机器学习-多抽牌 → 每天背单词
精良改造-费递减 → 越做越顺手
万物一心-回收0费 → 心流状态
第四强角色-最弱 → 鸡煲自嘲

输出纯JSON，不要markdown代码块：{"analysis":"一句话分析","cards":[{"name":"卡牌名","cost":"1","cost_color":"gold或blue或red","card_type":"能力/技能/诅咒/状态","rarity":"rare/uncommon/curse","character":"defect","effect":"梗化效果(结合用户场景)","flavor":"风味梗句","severity":"savage/funny/positive/healing"}]}`;

let savedKey='';

// 初始化：读localStorage
try{savedKey=localStorage.getItem('sts_key')||''}catch(e){}
if(savedKey){document.getElementById('keyInput').value=savedKey.slice(0,8)+'***';document.getElementById('keyHint').textContent='✅ 已保存';document.getElementById('keyHint').className='key-saved'}

// 保存Key
function saveKey(){
  const v=document.getElementById('keyInput').value.trim();
  if(!v)return;
  if(!v.startsWith('sk-')){t('Key格式应为sk-开头');return}
  savedKey=v;
  try{localStorage.setItem('sts_key',v)}catch(e){}
  document.getElementById('keyInput').value=v.slice(0,8)+'***';
  document.getElementById('keyHint').textContent='✅ 已保存';
  document.getElementById('keyHint').className='key-saved';
  t('Key已保存 ✅');
}
document.getElementById('keyInput').onchange=saveKey;
document.getElementById('keyInput').onblur=saveKey;
document.getElementById('keyInput').oninput=function(){if(this.value.startsWith('sk-')&&this.value.length>10)saveKey()};

async function go(){
  const text=document.getElementById('textInput').value.trim();
  if(!text){t('请输入文字');return}
  saveKey();
  if(!savedKey){t('请先填写API Key');return}

  showLoader(true);
  document.getElementById('result').classList.remove('show');
  document.getElementById('btnGo').disabled=true;

  try{
    const resp=await fetch(API_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+savedKey},
      body:JSON.stringify({model:MODEL,messages:[{role:'system',content:SP},{role:'user',content:'场景："'+text+'"。匹配最合适的卡牌，只输出JSON，不要markdown代码块。'}],max_tokens:2000,temperature:0.7})
    });
    if(!resp.ok){throw new Error('API '+resp.status)}
    const data=await resp.json();
    let msg=data.choices[0].message;
    let raw=(msg.content||msg.reasoning_content||'').trim();
    if(raw.startsWith('```'))raw=raw.replace(/```json\n?|```/g,'').trim();

    let result;
    try{result=JSON.parse(raw)}catch(e){result={analysis:'AI返回',cards:[{name:'偏差认知',cost:'1',cost_color:'gold',card_type:'能力',rarity:'rare',character:'defect',effect:raw.slice(0,300),flavor:'AI 生成',severity:'funny'}]}}

    showLoader(false);
    render(result,text);
  }catch(err){
    console.error(err);
    showLoader(false);
    t('AI调用失败: '+err.message.slice(0,30));
  }finally{
    document.getElementById('btnGo').disabled=false;
  }
}

function render(data,text){
  const p=document.getElementById('result');
  const cards=data.cards||[];
  const c=cards[0]||{};
  const sev=c.severity==='savage'?'💀':c.severity==='funny'?'😂':'✨';

  p.innerHTML=`
    <div class="r-card">
      <div class="r-top"><div class="r-cost">${c.cost||1}</div><div><div class="r-name">${c.name||'偏差认知'}</div><div class="r-type">${c.card_type||'能力'} · 鸡煲</div></div><span style="font-size:22px">${sev}</span></div>
      <div class="r-body">${(c.effect||'').replace(/\n/g,'<br>')}</div>
      ${c.flavor?`<div class="r-flavor">${c.flavor}</div>`:''}
    </div>
    <div style="text-align:center;margin-top:8px;font-size:11px;color:var(--text3)">${data.analysis||''}</div>
  `;
  p.classList.add('show');
  p.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function t(msg){const e=document.getElementById('toast');e.textContent=msg;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2200)}
function showLoader(s){document.getElementById('loader').classList.toggle('show',s)}

document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();go()}});
</script>
</body>
</html>
