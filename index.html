<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>尖塔梗生成器</title>
<meta name="description" content="输入你的生活场景，AI自动匹配杀戮尖塔卡牌梗。">
<meta name="theme-color" content="#0d0d1a">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
<style>
/* ============ 基础 ============ */
:root {
  --bg: #0d0d1a;
  --surface: #141428;
  --surface2: #1a1a32;
  --gold: #c8a84e;
  --gold-light: #e0c870;
  --gold-dim: #8a7030;
  --blue: #4a9eff;
  --blue-dim: #3058a0;
  --red: #e04040;
  --red-dim: #902020;
  --purple: #a040e0;
  --green: #4ac860;
  --text: #d8d8e0;
  --text2: #a0a0b0;
  --text3: #606078;
  --border: #2a2a40;
  --radius: 12px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family: -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Noto Sans SC',sans-serif;
  background:var(--bg); color:var(--text); min-height:100vh;
  -webkit-font-smoothing:antialiased;
  background-image:
    radial-gradient(ellipse at 20% 20%, rgba(74,158,255,0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(160,64,224,0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(200,168,78,0.02) 0%, transparent 70%);
}

/* ============ 主容器 ============ */
.app{max-width:680px;margin:0 auto;padding:20px 16px 40px;}

/* ============ 头部 ============ */
.header{text-align:center;padding:32px 0 24px;}
.header .emblem{
  width:72px;height:72px;margin:0 auto 12px;
  background:linear-gradient(135deg, var(--surface2), var(--surface));
  border:2px solid var(--gold-dim);border-radius:20px;
  display:flex;align-items:center;justify-content:center;
  font-size:36px;box-shadow:0 0 32px rgba(200,168,78,0.1);
}
.header h1{
  font-size:28px;font-weight:800;letter-spacing:4px;
  background:linear-gradient(180deg, var(--gold-light), var(--gold-dim));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.header .tagline{font-size:13px;color:var(--text3);margin-top:6px;}

/* ============ 模式标签 ============ */
.modes{display:flex;justify-content:center;gap:6px;margin-bottom:20px;}
.mode-tab{
  padding:8px 18px;border-radius:20px;border:1px solid var(--border);
  background:var(--surface);color:var(--text3);font-size:13px;
  cursor:pointer;transition:all 0.2s;font-family:inherit;display:flex;align-items:center;gap:5px;
}
.mode-tab:hover{color:var(--text2);border-color:#3a3a50;}
.mode-tab.active{background:var(--surface2);color:var(--blue);border-color:var(--blue-dim);}
.mode-tab .dot{width:6px;height:6px;border-radius:50%;display:inline-block;}
.mode-tab .dot.red{background:var(--red);}
.mode-tab .dot.blue{background:var(--blue);}

.lock-btn{
  cursor:pointer;font-size:14px;padding:6px 10px;border-radius:50%;
  transition:all 0.2s;opacity:0.5;background:transparent;border:none;color:var(--text3);
  display:flex;align-items:center;justify-content:center;
}
.lock-btn:hover{opacity:1;background:rgba(255,255,255,0.04);}
.lock-btn.unlocked{opacity:1;color:var(--gold);}

/* ============ 状态提示 ============ */
.status-bar{
  text-align:center;font-size:12px;color:var(--text3);margin-bottom:16px;
  padding:6px 0;transition:all 0.3s;
}
.status-bar.warn{color:#c08040;}
.status-bar.ok{color:#609060;}

/* ============ 输入卡片 ============ */
.card-panel{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px;margin-bottom:16px;
}
.card-panel:focus-within{border-color:#3a3a55;}

.card-panel textarea{
  width:100%;min-height:88px;background:var(--bg);
  border:1px solid var(--border);border-radius:10px;padding:14px;
  color:var(--text);font-size:15px;resize:vertical;font-family:inherit;
  outline:none;line-height:1.7;transition:border 0.2s;
}
.card-panel textarea:focus{border-color:var(--blue-dim);}
.card-panel textarea::placeholder{color:var(--text3);}

/* ============ 操作行 ============ */
.actions{display:flex;gap:10px;align-items:center;margin-top:12px;flex-wrap:wrap;}
.actions .hint{font-size:11px;color:var(--text3);}

/* 按钮 */
.btn{
  padding:10px 24px;border-radius:22px;border:none;
  font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;
  letter-spacing:0.5px;transition:all 0.2s;display:inline-flex;align-items:center;gap:6px;
}
.btn:active{transform:scale(0.97);}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}

.btn-primary{background:linear-gradient(135deg,var(--blue),#3560c0);color:#fff;box-shadow:0 2px 12px rgba(74,158,255,0.2);}
.btn-primary:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 18px rgba(74,158,255,0.35);}

.btn-purple{background:linear-gradient(135deg,var(--purple),#7020b0);color:#fff;box-shadow:0 2px 12px rgba(160,64,224,0.2);}
.btn-purple:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 18px rgba(160,64,224,0.35);}

.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2);}
.btn-ghost:hover{background:rgba(255,255,255,0.03);border-color:#4a4a60;}

/* 图片上传 */
.upload-trigger{
  display:inline-flex;align-items:center;gap:5px;padding:6px 14px;
  border-radius:16px;border:1px dashed var(--border);
  color:var(--text3);font-size:12px;cursor:pointer;transition:all 0.2s;
}
.upload-trigger:hover{border-color:var(--gold-dim);color:var(--gold);}
.upload-trigger.has-image{border-color:var(--blue-dim);color:var(--blue);border-style:solid;}
.upload-trigger img{width:20px;height:20px;border-radius:4px;object-fit:cover;}
.upload-trigger .remove{padding:2px 6px;border-radius:8px;color:var(--red);cursor:pointer;font-size:11px;}
input[type=file]{display:none;}

/* ============ 快捷标签 ============ */
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;}
.tag{
  padding:4px 12px;border-radius:14px;background:rgba(255,255,255,0.03);
  border:1px solid var(--border);color:var(--text3);font-size:12px;
  cursor:pointer;transition:all 0.15s;font-family:inherit;
}
.tag:hover{background:rgba(200,168,78,0.06);border-color:var(--gold-dim);color:var(--gold);}

/* ============ 加载 ============ */
.loader{display:none;text-align:center;padding:28px;}
.loader.show{display:block;}
.loader .ring{
  width:32px;height:32px;margin:0 auto 10px;
  border:2px solid var(--border);border-top-color:var(--blue);
  border-radius:50%;animation:spin 0.7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loader .msg{color:var(--text3);font-size:13px;}

/* ============ 结果 ============ */
.results{display:none;}
.results.show{display:block;}

.result-bar{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:10px 14px;margin-bottom:12px;
  font-size:12px;color:var(--text3);display:flex;align-items:center;gap:8px;
}
.result-bar .dot{width:5px;height:5px;border-radius:50%;background:var(--gold);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 3px var(--gold);}50%{box-shadow:0 0 10px var(--gold);}}

/* ============ 结果卡牌 ============ */
.result-card{
  background:linear-gradient(170deg,#181830,#101020);
  border:2px solid var(--border);border-radius:14px;
  overflow:hidden;margin-bottom:10px;transition:all 0.3s;
}
.result-card.rare{border-color:rgba(200,168,78,0.35);box-shadow:0 0 20px rgba(200,168,78,0.1);}
.result-card.uncommon{border-color:rgba(74,158,255,0.25);}
.result-card.curse{border-color:rgba(224,64,64,0.25);}

.result-card .card-top{
  display:flex;align-items:center;padding:12px 14px;
  border-bottom:1px solid var(--border);gap:10px;
}
.result-card .cost-orb{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:17px;flex-shrink:0;
}
.cost-0{background:#4a4a55;color:#bbb;}
.cost-1{background:linear-gradient(135deg,#4a9eff,#2a6ed0);color:#fff;}
.cost-2{background:linear-gradient(135deg,#a040e0,#7020b0);color:#fff;}
.cost-3{background:linear-gradient(135deg,#e0a040,#b06020);color:#fff;}
.cost-x,.cost-inf{background:linear-gradient(135deg,#e04040,#a02020);color:#fff;}

.result-card .card-info{flex:1;min-width:0;}
.result-card .card-name{font-size:18px;font-weight:800;}
.result-card .card-sub{font-size:11px;color:var(--text3);margin-top:1px;}

.name-gold{color:var(--gold);}
.name-blue{color:var(--blue);}
.name-red{color:var(--red);}
.name-purple{color:var(--purple);}
.name-green{color:var(--green);}

.result-card .card-body{padding:14px;}
.result-card .card-effect{font-size:14px;line-height:1.8;color:var(--text);white-space:pre-line;}
.result-card .card-effect em{color:var(--gold);font-style:normal;font-weight:700;}
.result-card .card-flavor{
  margin-top:8px;padding-top:8px;border-top:1px dashed #2a2a3a;
  font-size:12px;color:var(--text3);font-style:italic;line-height:1.5;
}
.result-card .card-meta{
  display:flex;flex-wrap:wrap;gap:5px;padding:0 14px 12px;
}
.result-card .card-meta span{
  padding:2px 8px;border-radius:8px;font-size:11px;
  font-weight:600;border:1px solid;
}
.meta-gold{color:var(--gold);background:rgba(200,168,78,0.06);border-color:rgba(200,168,78,0.2)!important;}
.meta-blue{color:var(--blue);background:rgba(74,158,255,0.05);border-color:rgba(74,158,255,0.15)!important;}
.meta-red{color:var(--red);background:rgba(224,64,64,0.05);border-color:rgba(224,64,64,0.15)!important;}
.meta-green{color:var(--green);background:rgba(74,200,96,0.05);border-color:rgba(74,200,96,0.15)!important;}

.badge-best{
  font-size:10px;padding:2px 8px;border-radius:6px;
  color:var(--gold);background:rgba(200,168,78,0.1);
  border:1px solid rgba(200,168,78,0.2);
}

/* ============ 分享 ============ */
.share-row{display:flex;gap:8px;margin-top:14px;align-items:center;}
.share-row input{
  flex:1;background:var(--bg);border:1px solid var(--border);
  border-radius:8px;padding:8px 12px;color:var(--text3);font-size:12px;
  font-family:inherit;outline:none;
}
.share-row .copy-btn{
  padding:6px 16px;border-radius:14px;border:1px solid var(--gold-dim);
  background:transparent;color:var(--gold);font-size:12px;
  cursor:pointer;transition:all 0.2s;font-family:inherit;flex-shrink:0;
}
.share-row .copy-btn:hover{background:rgba(200,168,78,0.08);}
.share-row .copy-btn.done{border-color:var(--green);color:var(--green);}

/* ============ 弹窗 ============ */
.overlay{
  display:none;position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.65);z-index:200;
  align-items:center;justify-content:center;padding:20px;
}
.overlay.show{display:flex;}
.modal{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:22px;max-width:380px;width:100%;
  animation:modalIn 0.2s ease;
}
@keyframes modalIn{from{opacity:0;transform:translateY(8px) scale(0.98);}to{opacity:1;transform:translateY(0) scale(1);}}
.modal h3{font-size:16px;margin-bottom:10px;color:var(--text);}
.modal .desc{font-size:12px;color:var(--text3);margin-bottom:14px;line-height:1.6;}
.modal input[type=password],.modal input[type=text]{
  width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--border);
  background:var(--bg);color:var(--text);font-size:14px;font-family:inherit;
  outline:none;margin-bottom:10px;transition:border 0.2s;
}
.modal input:focus{border-color:var(--blue-dim);}
.modal .err{font-size:11px;color:var(--red);margin-bottom:8px;display:none;}
.modal .err.show{display:block;}
.modal .btns{display:flex;gap:8px;justify-content:flex-end;}
.modal .btns button{
  padding:8px 18px;border-radius:16px;border:none;font-size:13px;
  cursor:pointer;font-family:inherit;font-weight:600;transition:all 0.2s;
}
.modal .btn-ok{background:linear-gradient(135deg,var(--blue),#3060c0);color:#fff;}
.modal .btn-no{background:transparent;border:1px solid var(--border);color:var(--text3);}
.modal .divider{text-align:center;color:var(--text3);font-size:11px;margin:12px 0;}
.modal .status{font-size:12px;padding:8px 12px;border-radius:8px;margin-bottom:10px;display:none;}
.modal .status.ok{display:block;background:rgba(74,200,96,0.06);color:var(--green);border:1px solid rgba(74,200,96,0.15);}
.modal .status.info{display:block;background:rgba(74,158,255,0.06);color:var(--blue);border:1px solid rgba(74,158,255,0.15);}

/* ============ Toast ============ */
.toast{
  position:fixed;top:16px;left:50%;transform:translateX(-50%);
  background:var(--surface2);border:1px solid var(--gold-dim);
  border-radius:20px;padding:10px 22px;color:var(--gold);font-weight:700;
  font-size:13px;box-shadow:0 4px 24px rgba(0,0,0,0.4);
  z-index:300;opacity:0;transition:opacity 0.3s;pointer-events:none;
}
.toast.show{opacity:1;}

/* ============ 页脚 ============ */
.footer{
  text-align:center;padding:24px 0 8px;color:var(--text3);font-size:11px;
  border-top:1px solid var(--border);margin-top:32px;
}
.footer a{color:var(--gold-dim);text-decoration:none;}
.footer a:hover{color:var(--gold);}

/* ============ 响应式 ============ */
@media(max-width:480px){
  .app{padding:12px 10px 32px;}
  .header{padding:20px 0 16px;}
  .header .emblem{width:56px;height:56px;font-size:28px;border-radius:16px;}
  .header h1{font-size:22px;}
  .mode-tab{padding:6px 14px;font-size:12px;}
  .result-card .card-name{font-size:16px;}
}
</style>
</head>
<body>

<div class="app">
  <!-- ===== 头部 ===== -->
  <header class="header">
    <div class="emblem">🤖</div>
    <h1>尖 塔 梗 生 成 器</h1>
    <p class="tagline">你说句话 &nbsp;→&nbsp; 鸡煲笑话</p>
  </header>

  <!-- ===== 模式标签 ===== -->
  <div class="modes">
    <button class="mode-tab active" onclick="setMode('ai')" id="tabAi">
      <span class="dot blue"></span> AI 模式
    </button>
    <button class="mode-tab" onclick="setMode('local')" id="tabLocal">
      <span class="dot red"></span> 闪电
    </button>
    <button class="lock-btn" id="lockBtn" onclick="openSettings()" title="AI 访问设置">🔒</button>
  </div>

  <!-- ===== 状态条 ===== -->
  <div class="status-bar warn" id="statusBar">🔒 AI 模式已锁定 — 点击 🔒 解锁，或使用右侧闪电模式</div>

  <!-- ===== 输入区 ===== -->
  <div class="card-panel">
    <textarea id="textInput" placeholder="描述你的情况…&#10;&#10;「今天学了六个单元学不下去了」&#10;「考试周连续五天考试」&#10;「debug 三小时发现少了个分号」" maxlength="600"></textarea>

    <div class="tags">
      <button class="tag" onclick="fill('今天学了六个单元就学不下去了')">学不动了</button>
      <button class="tag" onclick="fill('考试周连续五天考试')">考试周</button>
      <button class="tag" onclick="fill('室友打呼噜一晚上没睡好')">室友打呼噜</button>
      <button class="tag" onclick="fill('debug三小时发现少了个分号')">debug 崩溃</button>
      <button class="tag" onclick="fill('期末复习三天结果考试全不会')">复习白费</button>
      <button class="tag" onclick="fill('灵感来了疯狂写代码忘了吃饭')">心流状态</button>
      <button class="tag" onclick="fill('周末一觉睡到下午两点')">周末补觉</button>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="btnAI" onclick="analyzeAI()">🤖 分析</button>
      <button class="btn btn-ghost" id="btnLocal" onclick="analyzeLocal()" style="display:none">⚡ 分析</button>
      <button class="btn btn-ghost" onclick="randomGo()">🎲 随机</button>
      <span class="upload-trigger" id="uploadTrigger" onclick="document.getElementById('imgInput').click()">📷 图片</span>
      <input type="file" id="imgInput" accept="image/*" onchange="handleImage(event)">
      <span class="hint">Ctrl+Enter 快速分析</span>
    </div>
  </div>

  <!-- ===== 加载 ===== -->
  <div class="loader" id="loader">
    <div class="ring"></div>
    <div class="msg" id="loaderMsg">正在启动……</div>
  </div>

  <!-- ===== 结果区 ===== -->
  <div class="results" id="results"></div>

  <!-- ===== 页脚 ===== -->
  <footer class="footer">
    由 <strong>地大夏目夏目夏</strong> 制作 &nbsp;·&nbsp;
    基于《杀戮尖塔》社区梗文化 &nbsp;·&nbsp;
    <a href="https://github.com/liutianhao317/spire-meme-generator" target="_blank">GitHub</a>
  </footer>
</div>

<!-- ===== 设置弹窗 ===== -->
<div class="overlay" id="settingsOverlay">
  <div class="modal">
    <h3>⚙️ 解锁 AI 模式</h3>
    <p class="desc">AI 模式需要解锁才能使用。输入密码可使用站长的 API，或填入你自己的 Key。</p>
    <div class="status" id="unlockStatus"></div>
    <input type="password" id="pwdInput" placeholder="输入访问密码" autocomplete="off">
    <div class="err" id="pwdErr">密码错误，请重试</div>
    <div class="btns">
      <button class="btn-no" onclick="closeSettings()">取消</button>
      <button class="btn-ok" onclick="unlockWithPassword()">解锁</button>
    </div>
    <div class="divider">或者使用自己的 Key</div>
    <input type="text" id="keyInput" placeholder="sk-xxxxxxxx" autocomplete="off">
    <p style="font-size:11px;color:var(--text3);margin:-4px 0 10px;">Key 只存在你的浏览器里，不发送到服务器</p>
    <div class="btns">
      <button class="btn-no" onclick="closeSettings()">取消</button>
      <button class="btn-ok" onclick="saveOwnKey()">保存 Key</button>
    </div>
  </div>
</div>

<!-- ===== Toast ===== -->
<div class="toast" id="toast"></div>

<script>
// ============ 状态 ============
let mode = 'ai';
let imgB64 = null;
let imgName = '';
let aiUnlocked = false;
let userKey = '';
let unlockPwd = '';

// ============ 初始化 ============
(function init(){
  if(localStorage.getItem('sts_ai_unlocked')==='1'){aiUnlocked=true;unlockPwd=localStorage.getItem('sts_password')||'';}
  if(localStorage.getItem('sts_user_key')){userKey=localStorage.getItem('sts_user_key');}
  updateLockUI();
  setMode(mode);
})();

// ============ 模式切换 ============
function setMode(m){
  mode=m;
  document.getElementById('tabAi').classList.toggle('active',m==='ai');
  document.getElementById('tabLocal').classList.toggle('active',m==='local');
  document.getElementById('btnAI').style.display=m==='ai'?'':'none';
  document.getElementById('btnLocal').style.display=m==='local'?'':'none';

  const bar=document.getElementById('statusBar');
  if(m==='ai'&&!aiUnlocked&&!userKey){
    bar.textContent='🔒 AI 模式已锁定 — 点击 🔒 解锁，或切换到闪电模式';
    bar.className='status-bar warn';
  }else if(m==='ai'){
    bar.textContent=(aiUnlocked?'✅ 已解锁':'🗝️ 自有 Key')+' — AI 模式就绪';
    bar.className='status-bar ok';
  }else{
    bar.textContent='⚡ 闪电模式 — 本地关键词匹配，离线可用';
    bar.className='status-bar';
  }
}

// ============ 图片 ============
function handleImage(e){
  const f=e.target.files[0];if(!f)return;
  if(f.size>10*1024*1024){toast('图片太大');return;}
  imgName=f.name;
  const r=new FileReader();
  r.onload=ev=>{imgB64=ev.target.result.split(',')[1];document.getElementById('uploadTrigger').classList.add('has-image');document.getElementById('uploadTrigger').textContent='📷 '+f.name.substring(0,12);};
  r.readAsDataURL(f);
}

// ============ AI 分析 ============
async function analyzeAI(){
  const text=document.getElementById('textInput').value.trim();
  if(!text&&!imgB64){toast('请输入文字或上传图片');return;}

  loader(true,'正在分析……');
  document.getElementById('results').classList.remove('show');
  document.getElementById('btnAI').disabled=true;

  try{
    const apiUrl=window.location.hostname==='localhost'?'http://localhost:8765/api/analyze':'/api/analyze';
    const body={text:text||undefined};
    if(imgB64)body.image=imgB64;
    if(aiUnlocked)body.password=unlockPwd;
    if(userKey)body.api_key=userKey;

    const resp=await fetch(apiUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!resp.ok){
      const err=await resp.json().catch(()=>({}));
      if(err.error==='未解锁'||err.message?.includes('未解锁')){toast('请先解锁 AI 模式');openSettings();return;}
      throw new Error(err.message||'服务器错误');
    }
    const data=await resp.json();
    loader(false);
    render(data,text||'图片分析');
  }catch(err){
    console.error(err);
    loader(false);
    toast('AI 不可用，已切换闪电模式');
    analyzeLocal();
  }finally{
    document.getElementById('btnAI').disabled=false;
  }
}

// ============ 本地分析 ============
function analyzeLocal(){
  const text=document.getElementById('textInput').value.trim();
  if(!text){toast('请输入文字');return;}
  if(text.length<2){toast('多说两句嘛');return;}
  loader(true,'匹配中……');
  setTimeout(()=>{
    loader(false);
    const cards=localMatch(text);
    render({analysis:'本地关键词匹配',cards},text);
  },300);
}

// ============ 渲染 ============
function render(data,inputText){
  const p=document.getElementById('results');
  const cards=data.cards||[];
  const short=inputText.length>35?inputText.slice(0,35)+'…':inputText;
  let h='';

  h+=`<div class="result-bar"><div class="dot"></div>${data.analysis||''} — "${short}" → ${cards.length} 张</div>`;

  cards.forEach((c,i)=>{
    const rc=c.rarity==='rare'?'rare':c.rarity==='curse'?'curse':c.rarity==='uncommon'?'uncommon':'';
    const costCls=c.cost==='∞'||c.cost==='?'?'cost-inf':isNaN(c.cost)||Number(c.cost)>3?'cost-x':'cost-'+c.cost;
    const nc=c.cost_color==='gold'?'name-gold':c.cost_color==='red'?'name-red':c.cost_color==='purple'?'name-purple':c.cost_color==='green'?'name-green':'name-blue';
    const sev=c.severity==='savage'?'💀':c.severity==='funny'?'😂':c.severity==='positive'?'✨':'💚';
    const mc=c.rarity==='rare'?'meta-gold':c.rarity==='curse'?'meta-red':c.rarity==='uncommon'?'meta-blue':'meta-green';
    const charMap={defect:'鸡煲',ironclad:'战士',silent:'猎手',watcher:'观者',neutral:'无色'};

    h+=`<div class="result-card ${rc}">
      <div class="card-top">
        <div class="cost-orb ${costCls}">${c.cost}</div>
        <div class="card-info">
          <div class="card-name ${nc}">${c.name}</div>
          <div class="card-sub">${c.card_type||'卡牌'} · ${charMap[c.character]||c.character||'鸡煲'}</div>
        </div>
        ${i===0?'<span class="badge-best">最佳</span>':''}
        <span>${sev}</span>
      </div>
      <div class="card-body">
        <div class="card-effect">${(c.effect||'').replace(/\\n/g,'<br>')}</div>
        ${c.flavor?`<div class="card-flavor">${c.flavor}</div>`:''}
      </div>
      <div class="card-meta">
        <span class="${mc}">${c.card_type||'卡牌'}</span>
        <span class="${mc}">${sev} ${c.severity==='savage'?'暴击':c.severity==='funny'?'搞笑':c.severity==='positive'?'正能量':'治愈'}</span>
        ${c.rarity?`<span class="${mc}">${c.rarity==='rare'?'稀有':c.rarity==='uncommon'?'罕见':c.rarity==='curse'?'诅咒':c.rarity==='common'?'普通':'基础'}</span>`:''}
      </div>
    </div>`;
  });

  // 分享
  const share=cards.map(c=>`【${c.name}】${c.flavor||c.effect?.split('\\n')[0]||''}`).join('\n');
  h+=`<div class="share-row">
    <input value="${share.replace(/"/g,'&quot;')}" readonly id="shareInput">
    <button class="copy-btn" onclick="copyShare()">复制</button>
  </div>`;

  p.innerHTML=h;
  p.classList.add('show');
  p.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function copyShare(){
  const inp=document.getElementById('shareInput');if(!inp)return;
  inp.select();document.execCommand('copy');
  const btn=document.querySelector('.copy-btn');
  btn.textContent='已复制';btn.classList.add('done');
  toast('已复制！去迫害朋友吧 😂');
  setTimeout(()=>{btn.textContent='复制';btn.classList.remove('done');},2000);
}

// ============ 设置 ============
function openSettings(){
  document.getElementById('settingsOverlay').classList.add('show');
  document.getElementById('pwdInput').value='';
  document.getElementById('keyInput').value=userKey;
  document.getElementById('pwdErr').classList.remove('show');
  updateUnlockStatus();
  setTimeout(()=>document.getElementById('pwdInput').focus(),200);
}
function closeSettings(){
  document.getElementById('settingsOverlay').classList.remove('show');
  setMode(mode);
}
function updateUnlockStatus(){
  const s=document.getElementById('unlockStatus');
  if(aiUnlocked){s.className='status ok';s.textContent='✅ 已解锁 — AI 模式可用';}
  else if(userKey){s.className='status info';s.textContent='🗝️ 当前使用自有 Key';}
  else{s.className='status';}
}

async function unlockWithPassword(){
  const pwd=document.getElementById('pwdInput').value.trim();
  if(!pwd){document.getElementById('pwdErr').classList.add('show');return;}
  document.getElementById('pwdErr').classList.remove('show');

  const apiUrl=window.location.hostname==='localhost'?'http://localhost:8765/api/analyze':'/api/analyze';
  try{
    const resp=await fetch(apiUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:'verify',password:pwd,verify_only:true})});
    if(resp.ok){
      aiUnlocked=true;unlockPwd=pwd;userKey='';
      localStorage.setItem('sts_ai_unlocked','1');localStorage.setItem('sts_password',pwd);
      localStorage.removeItem('sts_user_key');
      updateLockUI();updateUnlockStatus();
      toast('✅ AI 模式已解锁！');
      setMode('ai');closeSettings();
    }else{
      document.getElementById('pwdErr').classList.add('show');
    }
  }catch(e){toast('无法连接服务器');}
}

function saveOwnKey(){
  const key=document.getElementById('keyInput').value.trim();
  if(!key){toast('请输入 API Key');return;}
  if(!key.startsWith('sk-')){toast('Key 格式应为 sk- 开头');return;}
  userKey=key;aiUnlocked=false;unlockPwd='';
  localStorage.setItem('sts_user_key',key);localStorage.removeItem('sts_ai_unlocked');localStorage.removeItem('sts_password');
  updateLockUI();updateUnlockStatus();
  toast('✅ 已保存你的 Key！');
  setMode('ai');closeSettings();
}

function updateLockUI(){
  const btn=document.getElementById('lockBtn');
  if(aiUnlocked||userKey){btn.textContent='🔓';btn.classList.add('unlocked');btn.title='AI 已解锁';}
  else{btn.textContent='🔒';btn.classList.remove('unlocked');btn.title='AI 已锁定';}
}
